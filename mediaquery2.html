<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style>
		 *
		{
			box-sizing: border-box;
		}

		/*style the top navigation bar*/
		.topnav{
			overflow:hidden;
			background-color: #2e2d2d;
		}

		/*style the topnav links */
		.topnav a {
			
			float: left;
			display: block;
			color: #f2f2f2;
			text-align: center;
			padding: 20px;
			text-decoration: none;
		}

		/*change color on hover*/
		.topnav a:hover{
			background-color: #ddd;
			color: black;
		}

/*on screens that are 600px wide or less, make the menulinks stack on top of eachother instead of next to each other*/
@media screen and (max-width:600px)
{

	.topnav a {
		float: none;
		width: 100%;
	}

}
	</style>

</head>
<body>
 
 <h2>responsive navigation  menu</h2>

 <p>Resize the browser window to see the effect:when the screen is less than 600px,the 
	navigation menu will be displayed vertically instead of horizontally</p>

 <div class="topnav">
 	<a href="#">Link 1</a>
 	<a href="#">Link 2</a>
 	<a href="#">Link 3</a>
 </div>
 
</body>
</html>
