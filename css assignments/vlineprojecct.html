<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vline</title>
    <style>
      .vline
            {
            height: 1000px;
            border-left:10px solid;
            left:50%;
            position:absolute;
            }
            
    </style>
        
</head>
<body>
     <div class="form-box">
      <h2>Create an Account</h2>
    <form>
        <table>
         <tr>
            <td><input type="text" placeholder="Name"></td>
         </tr>
         <tr>
            <td><input type="date" placeholder="DOB"></td>
         </tr>
        <td>Gender</td>
        <tr>
        <td>
                 <input type="radio" value="male" name="r">Male
                 <input type="radio" value="female" name="r">female
        </td>
        </tr>
        <tr>
        <td> <textarea placeholder="Address"></textarea></td>
        </tr>
       <tr> 
        <td>
            <select>
            <option>Hubli</option>
            <option>Dharwad</option>
            <option>Bangalore</option>
            </select>
        </td>
        </tr>
        <tr><td><input type="email" placeholder="Email"></td></tr>
        <tr><td><input type="password" placeholder="Password"></td></tr>
        <tr><td><input type="text" placeholder="Mobile No"></td></tr>
        <tr><td><button class="btn">Create an Account</button></td>
        </tr> 
    </form>
       </div>
    </table>
        



    <div class="main">
        <div class="vline"></div>
    </div>



    <div  class="login-box">
            <h2>LOGIN NOW</h2>
        <form>
        <table>
        <tr>
            <td><input type="text" 
                placeholder="Enter your username"></td>
        </tr>
        <tr>
            <td><input type="password" 
                placeholder="Enter your password"></td>
        </tr>
        <tr>   
            <td><button class="btn">LOGIN</button></td>
        </tr>
        </table>
        </form>
    </div>
</body>
</html>
