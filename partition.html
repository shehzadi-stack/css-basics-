<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>External css partition</title>
    <style>
    .header{
             height:100px;
             width:100%;
             background-color: aqua;
             text-align: center;
             
           }

      .main{
            height:500px;
            width:40%;
            background-color: rgb(243, 134, 17);
            float:left;
            text-align: center;
           }

    .left{
            height:500px;
            width:30%;
            background-color: rgb(19, 228, 68);
            float:left;
            text-align: center;
            }

    .right{
            height:500px;
            width:30%;
            background-color: rgb(230, 141, 136);
            float:left;
            text-align: center;
            }

    .footer{
            height:100px;
            width: 100%;
            background-color: rgb(217, 33, 131);
            text-align: center;
            clear: both;
            }
    </style>
</head>
<body>
      <div class="header">
       <p>header</p> 
      </div>

      <div class="left">
         <p>left</p> 
      </div>

      <div class="main">
        <p>main</p>
      </div>

      <div class="right">
        <p>right</p>
      </div>

      <div class="footer">
       <p>footer</p>
      </div>
</body>
</html>
