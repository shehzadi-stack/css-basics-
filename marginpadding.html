<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>margin and padding</title>
    <style>
        *{
            margin: 2px;
            padding:2px;
        }

        p{
            background-color:rgb(236, 236, 16);
            border: 10px solid hotpink;
            text-align:center;
            font-size:20px;
            padding:5px;
            margin:2px;
        }


        h5{
            background-color:rgb(236, 11, 11);
            border:5px solid  black;
            text-align:center;
            padding:10px;
            margin:10px;
        }


        h1{
            background-color: rgb(29, 111, 37);
            border:                   5px  solid black;
            text-align:                    center;
            padding-left:             10px;
            /* padding does not have negative values */
            padding-right:            10px;
            padding-bottom:           10px;
            padding-top:              10px;
            margin:                   px;
        }


        h3{  
            background-color:                     rgb(88, 77, 86);
            border:                    5px  solid black;
            text-align:                     center;
            padding:                   10px;
            /* margin-top:             -15px;
              margin can have negative value */
            margin-bottom:              5px;
            margin-left:               25px;
            margin-right:              25px;
        }
    </style>
</head>


<body>
    <p>Lorem ipsum dolor sit amet.</p>
    <br>
    <h5>Lorem ipsum dolor sit amet.</h5>
    <br>
    <h1>lorem5</h1>
    <br>
    <h3>Lorem ipsum dolor sit amet.</h3>
    <br>
</body>
</html>
