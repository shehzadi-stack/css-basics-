<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display properties</title>
    <style>
        p{
            height:200px;
            width:200px;
            background-color: forestgreen;
            text-align: center;
            font-size: large;

            /* display: block;
            -----default property */

            display: inline-block;  
            /* ----there is no overlap in this if we use it no float property is used. */

            /* display: inline;
            -----it doesnt take height and width change only its type default*/
        }
    </style>
</head>
<body>
   <p>box1</p>
   <p>box2</p>
   <p>box3</p>
</body>
</html>
