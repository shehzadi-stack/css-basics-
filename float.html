<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float</title>
    <style>
        .p1
        {
           width: 200px;
           height: 200px;
           text-align: center;
           background-color: rgb(97, 233, 12);
        }
        #p2
        {
           width: 200px;
           height: 200px;
           text-align: center;
           background-color: rgb(164, 5, 138);
         }
        .p3
        {
           width: 200px;
           height: 200px;
           text-align: center;
           background-color: rgb(56, 19, 226);
        }
        #p4
        {
           width: 200px;
           height: 200px;
           text-align: center;
           background-color: rgb(232, 213, 4);
        }
           /* float: left;
           margin-left: 20px; */
           /* float: right;
           margin-right: 20px; */
        
        .p1,#p2
        {
            float:left;
           
        }

         .p3,#p4
        {
            float:right;
            
        }
    </style>
</head>
<body>
    <p class="p1">lorem1</p>
    <p id="p2">lorem2</p>
    <p class="p3">lorem3</p>
    <p id="p4">Lorem4</p>
</body>
</html>
