<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu bar/nav bar</title>
    <style>
        .header{
            height: 100px;
            width:100%;
            background-color: darkgoldenrod;
        }
        .header ul li{
            float: left;
            margin-left:80px;
            list-style: none;
            padding-top: 20px;
        }
        h1{
            width: 40%;
            float: left;
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Flipkart</h1>
        <ul>
            <li>About</li>
            <li>Home</li>
            <li>Login</li>
            <li>Contact</li>
            <li>Extras</li>
        </ul>
    </div>
</body>
</html>
