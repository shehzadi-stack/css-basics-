<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Index</title>
    <style>
        img{
            height: 300px;
            width:  300px;
            position: absolute;
            z-index: -2;
            /* ---always use -ve values to make text  */
            /* come at front. and +ve values text goes back and only img is visible */
        }

        h1{
            color: rgb(60, 207, 15);
        }
    </style>
</head>
<body>
    <img src="p2.jpg" alt="">
    <h1>welcome</h1>
</body>
</html>
