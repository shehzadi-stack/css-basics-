<!DOCTYPE html>
<html>
<head>
<style>
.hidden {
  display: none;
}
</style>
</head>
<body>
  
<p>This paragraph is visible.</p>
<p class="hidden">This paragraph is hidden.</p>
<p>This is after the hidden paragraph.</p>

<!-- <p>Answer: In this case, the second paragraph disappears completely — the third paragraph moves up as if the hidden one was never there.
    
    Difference from visibility: hidden;
display: none; → element is gone (no space left).
visibility: hidden; → element is invisible but still takes up space.

👉 So, display: none; = "remove it from the page layout."
</p> -->
</body>
</html>
