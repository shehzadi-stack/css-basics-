<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box_shadow text_shadow</title>
    <style>
        div{
            text-align:center;
            height:300px ;
            width:300px ;
            background-color: forestgreen;
            color: rgb(29, 238, 224);
            /* box-shadow: 1px 5px 16px; */
            box-shadow: 2px 10px 20px inset rgb(189, 209, 8);
        }
        p{
            text-shadow: -12px 6px 5px yellow
        }
    </style>
</head> 
<body>
    <div>
        <p>HELLO SHAAZ</p>
    </div>
</body>
</html>
